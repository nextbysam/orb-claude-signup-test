[agent]
name = "claude-orb-signup-test"
lang = "python"
entry = "agent.py"

[agent.env]
HTTP_PORT = "8000"
PYTHONUNBUFFERED = "1"
ORB_TEST_VAR = "hello-from-claude"

[source]
git = "https://github.com/nextbysam/orb-claude-signup-test"
branch = "main"

[build]
working_dir = "/agent/code"
steps = [
    "python3 -c \"print('no-op build')\"",
]

[llm]
base_url = "https://api.anthropic.com"

[ports]
expose = [8000]

[resources]
runtime = "2GB"
disk = "4GB"
